<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1, user-scalable=no">
  <title>Escape Road Game - Enhanced</title>

  <link rel="shortcut icon" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
    }

    .game-container {
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border-radius: 10px;
      overflow: hidden;
      animation: containerGlow 3s ease-in-out infinite;
    }

    @keyframes containerGlow {
      0%, 100% {
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(102, 126, 234, 0.3);
      }
      50% {
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 60px rgba(102, 126, 234, 0.6);
      }
    }

    canvas {
      display: block;
      background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
    }

    .game-info {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      color: white;
      font-size: 14px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <canvas id="gameCanvas"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
